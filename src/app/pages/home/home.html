<div class="home">
  <section class="home__hero" aria-labelledby="home-hero-heading">
    <div class="home__hero-inner">
      <div class="home__hero-copy">
        <h1 id="home-hero-heading" class="home__hero-heading">
          <span class="home__hero-heading-line">EL ÉXITO</span>
          <span class="home__hero-heading-line home__hero-heading-line--accent">TE ESPERA.</span>
        </h1>
        <p class="home__hero-text">
          Crea tu propio grupo o únete a uno existente. Realiza tu predicción y confía en tu intuición.
        </p>
        <div class="home__hero-actions">
          <button type="button" class="home__btn home__btn--primary">
            <img
              class="home__btn-icon"
              ngSrc="/icons/create.svg"
              width="20"
              height="20"
              alt=""
              aria-hidden="true"
            />
            <span>CREAR NUEVO GRUPO</span>
          </button>
          <button type="button" class="home__btn home__btn--secondary">
            <img
              class="home__btn-icon"
              ngSrc="/icons/join.svg"
              width="24"
              height="16"
              alt=""
              aria-hidden="true"
            />
            <span>UNIRSE A UN GRUPO</span>
          </button>
        </div>
      </div>
      <div class="home__hero-media">
        <div class="home__hero-frame">
          <img
            ngSrc="/images/stadium.png"
            width="593"
            height="593"
            priority
            class="home__hero-image"
            alt="Football stadium at night, view from the pitch toward the stands"
          />
        </div>
      </div>
    </div>
  </section>

  <section class="home__panel" aria-labelledby="home-panel-heading">
    <div class="home__panel-inner">
      <header class="home__panel-header">
        <div class="home__panel-intro">
          <p class="home__panel-eyebrow">TU PANEL</p>
          <h2 id="home-panel-heading" class="home__panel-title">GRUPOS ACTIVOS</h2>
        </div>
        <p-button
          type="button"
          label="VER TODOS"
          icon="pi pi-angle-right"
          iconPos="right"
          [link]="true"
          [text]="true"
          styleClass="home__panel-all"
        />
      </header>
      <ul class="home__panel-cards">
        @for (g of activeGroups; track g.id) {
          <li class="home__panel-card-item">
            <app-group-card
              [iconClass]="g.iconClass"
              [iconColor]="g.iconColor"
              [groupName]="g.groupName"
              [points]="g.points"
              [participantCount]="g.participantCount"
            />
          </li>
        }
      </ul>
    </div>
  </section>
</div>
